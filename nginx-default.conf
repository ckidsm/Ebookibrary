server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    # 책 HTML/JSON: 분석을 다시 빌드하면 내용이 바뀌므로 항상 서버 재검증.
    # (옛 콘솔 페이지 등이 브라우저 캐시로 남아 헷갈리던 문제 방지 — 2026-06-04)
    # ETag 기반 conditional GET 이라 안 바뀌었으면 304, 바뀌면 새 내용.
    location ~* \.(html|json)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
